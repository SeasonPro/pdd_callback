<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>授权跳转中...</title></head>
<body>
  <p>正在跳转回本地服务，请稍候...</p>
  <script>
    var code = new URLSearchParams(location.search).get('code');
    if (code) {
      location.href = 'http://localhost:5001/api/pdd/auth/callback?code=' + code;
    } else {
      document.body.innerHTML = '<p style="color:red">授权失败，缺少 code</p>';
    }
  </script>
</body>
</html>
