<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>授权跳转中...</title></head>
<body>
  <p>正在跳转回本地服务，请稍候...</p>
  <script>
    var params = new URLSearchParams(location.search);
    var code = params.get('code');
    // state 中携带本地回调地址
    var localServer = params.get('state') || 'http://localhost:5200';
    if (code) {
      location.href = localServer + '/api/pdd/auth/callback?code=' + code;
    } else {
      document.body.innerHTML = '<p style="color:red">授权失败，缺少 code</p>';
    }
  </script>
</body>
</html>
